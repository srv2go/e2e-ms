name: Vertical Slice — Phase 1 (Visa vs Mastercard)

on:
  push:
    branches: [ main, develop ]
    paths:
      - "backend/network/**"
      - "backend/mapping/**"
      - "backend/main.py"
      - "tests/test_vertical_slice.py"
      - ".github/workflows/vertical_slice.yml"
  pull_request:
    branches: [ main ]

jobs:
  vertical-slice:
    name: "T6 — Vertical Slice Test (no Docker)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pyiso8583 \
            pyyaml \
            fastapi \
            uvicorn \
            pydantic \
            requests \
            pymongo \
            motor \
            pytest \
            pytest-anyio

      - name: Run vertical-slice tests
        run: |
          python -m pytest tests/test_vertical_slice.py -v \
            --tb=short \
            --junit-xml=test-results/vertical_slice.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
